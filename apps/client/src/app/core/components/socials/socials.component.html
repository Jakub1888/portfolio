<div class="socials">
    <ul>
        <li *ngFor="let social of socials" class="socials-item">
            <a class="link" href="{{ social.link }}" target="_blank" rel="noopener noreferrer">
                <img
                    class="socials-img"
                    src="assets/svg/{{ social.label }}.svg"
                    alt="{{ social.label }} logo"
                />
            </a>
        </li>
    </ul>
</div>
