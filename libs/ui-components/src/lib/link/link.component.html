<a
    *ngIf="link.routerLink"
    routerLink="{{ link.routerLink }}"
    class="link {{ link.class }}"
    routerLinkActive="active-route"
>
    {{ link.title }}
</a>

<a
    *ngIf="link.href"
    href="{{link.href}}"
    class="{{ link.class }}"
    target="_blank"
    rel="noopener noreferrer"
>
    {{ link.title }}
</a>
