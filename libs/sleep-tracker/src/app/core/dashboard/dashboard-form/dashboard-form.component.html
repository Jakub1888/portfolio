<section>
    <form class="sleep-tracker-form" [formGroup]="sleepTrackerForm" (submit)="onSubmit()">
        <div class="form-col">
            <mat-form-field appearance="outline">
                <mat-label>Date of sleep</mat-label>
                <input formControlName="dateOfSleep" matInput [matDatepicker]="picker" />
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Bed time</mat-label>
                <input formControlName="wentToBedAt" type="time" matInput placeholder="22:00" />
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Wake up time</mat-label>
                <input formControlName="wokeUpAt" type="time" matInput placeholder="06:00" />
            </mat-form-field>
        </div>

        <div class="form-col">
            <mat-form-field appearance="outline">
                <mat-label>Sleep quality</mat-label>
                <mat-select formControlName="quality">
                    <mat-option *ngFor="let quality of qualities" [value]="quality">
                        {{ quality }}
                    </mat-option>
                </mat-select>
                <mat-hint>1 = poor, 5 = excellent</mat-hint>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Mood after waking up</mat-label>
                <mat-select formControlName="mood">
                    <mat-option *ngFor="let quality of qualities" [value]="quality">
                        {{ quality }}
                    </mat-option>
                </mat-select>
                <mat-hint>1 = poor, 5 = excellent</mat-hint>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Description</mat-label>
                <textarea
                    formControlName="description"
                    matInput
                    cdkTextareaAutosize
                    #autosize="cdkTextareaAutosize"
                    cdkAutosizeMinRows="1"
                    cdkAutosizeMaxRows="5"
                ></textarea>
            </mat-form-field>
        </div>

        <div class="form-btn">
            <button button type="submit" color="secondary">Submit</button>
        </div>
    </form>
</section>
